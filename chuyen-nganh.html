.hub-content{padding:36px 48px;max-width:1100px;margin:0 auto;position:relative;z-index:1}
.hub-hero{background:linear-gradient(135deg,rgba(100,216,165,0.08),rgba(123,110,246,0.05));border:0.5px solid var(--border);border-radius:18px;padding:28px;margin-bottom:28px}

.fc-count{font-size:12px;color:var(--accent)}

.vp-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}

.vw-card{background:var(--card2);border:0.5px solid var(--border);border-radius:10px;padding:12px;transition:all .15s}
.vw-card:hover{border-color:rgba(100,216,165,0.3)}
.vw-word{font-size:16px;font-weight:500;color:var(--text)}
.vw-ipa{font-size:11px;color:var(--accent);font-style:italic}
.vw-vi{font-size:13px;color:var(--text3);margin-top:2px}
.vw-meta{display:flex;gap:4px;margin-top:4px}
.vw-lv{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:500}
.lv-A1,.lv-A2{background:rgba(107,203,119,0.15);color:var(--green)}
.lv-B1{background:rgba(240,194,122,0.15);color:var(--accent3)}
.lv-B2{background:rgba(167,139,250,0.15);color:var(--accent2)}

];

// FIELD_VOCAB loaded from dict-fields.js (pre-built)
// Match all sub-groups that contain any of the field's keywords
function getVocabForField(field) {
  var words = [];
  var seen = {};
  if(typeof FIELD_VOCAB==='undefined') return words;
  var allKeys = Object.keys(FIELD_VOCAB);
  field.keys.forEach(function(k) {
    var kUp = k.toUpperCase();
    allKeys.forEach(function(groupName) {
      var gUp = groupName.toUpperCase();
      if(gUp.indexOf(kUp) !== -1) {
        FIELD_VOCAB[groupName].forEach(function(w) {
          if(!seen[w[0]]) {
            seen[w[0]]=1;
            words.push({word:w[0],ipa:w[1],vi:w[2],lv:w[3],pos:w[4]});
          }
        });
      }
    });
  });
  return words;
}

renderCards();

function renderCards(){
  var grid=document.getElementById('fieldGrid');
  var html='';
  FIELDS.forEach(function(f){
    var words=getVocabForField(f);
    var count=words.length;
    html+='<div class="field-card" data-id="'+f.id+'" data-name="'+f.name+'" onclick="showField(\''+f.id+'\')">';
    html+='<div class="fc-icon"><i data-lucide="'+f.icon+'" style="width:20px;height:20px"></i></div>';
    html+='<div class="fc-name">'+f.name+'</div>';
    html+='<div class="fc-count">'+(count||'10+')+' từ</div>';
    html+='<div class="fc-desc">'+f.desc+'</div>';
    html+='</div>';
  });
  grid.innerHTML=html;
  if(window.lucide) lucide.createIcons();
}

function showField(id){
  var field=FIELDS.find(function(f){return f.id===id});
  if(!field) return;
  // Collect words
  var words=getVocabForField(field);

  var panel=document.getElementById('vocabPanel');
  document.getElementById('vpTitle').innerHTML='<i data-lucide="'+field.icon+'" style="width:20px;height:20px;display:inline-block;vertical-align:-4px;margin-right:6px"></i> '+field.name+' ('+words.length+' từ)';

  var linkHtml='';
  if(field.link) linkHtml='<a href="'+field.link+'" class="existing-link"><i data-lucide="book-open" style="width:14px;height:14px"></i> Xem bài học chi tiết</a>';
  document.getElementById('vpLink').innerHTML=linkHtml;

  var html='';
  words.forEach(function(w){
    html+='<div class="vw-card">';
    html+='<div class="vw-word">'+w.word+'</div>';
    html+='<div class="vw-ipa">'+w.ipa+'</div>';
    html+='<div class="vw-vi">'+w.vi+'</div>';
    html+='<div class="vw-meta"><span class="vw-lv lv-'+w.lv+'">'+w.lv+'</span><span class="vw-pos">'+w.pos+'</span></div>';
    html+='</div>';
  });
  if(!words.length) html='<div style="color:var(--text3);padding:20px">Đang cập nhật từ vựng cho ngành này...</div>';
  document.getElementById('vpGrid').innerHTML=html;
  panel.classList.add('show');
  panel.scrollIntoView({behavior:'smooth',block:'start'});

  // Highlight active card
  document.querySelectorAll('.field-card').forEach(function(c){c.classList.remove('active')});
  var card=document.querySelector('[data-id="'+id+'"]');
  if(card) card.classList.add('active');
  if(window.lucide) lucide.createIcons();
}

function closePanel(){
  document.getElementById('vocabPanel').classList.remove('show');
  document.querySelectorAll('.field-card').forEach(function(c){c.classList.remove('active')});
}

function filterFields(q){
  q=q.toLowerCase();
  document.querySelectorAll('.field-card').forEach(function(c){
    var name=c.getAttribute('data-name').toLowerCase();
    c.style.display=(!q||name.indexOf(q)!==-1)?'':'none';
  });
}

if(window.lucide) lucide.createIcons();
</script>
