const WORDS_EX = [
  {en:"phenomenon",vi:"hi\u1ec7n t\u01b0\u1ee3ng",opts:["phenomenon", "consequences", "vulnerability", "unprecedented"]},
  {en:"deteriorate",vi:"x\u1ea5u \u0111i",opts:["deteriorate", "consequences", "comprehensive", "contemporary"]},
  {en:"unprecedented",vi:"ch\u01b0a t\u1eebng c\u00f3",opts:["unprecedented", "predominant", "vulnerability", "comprehensive"]},
  {en:"infrastructure",vi:"c\u01a1 s\u1edf h\u1ea1 t\u1ea7ng",opts:["infrastructure", "comprehensive", "nevertheless", "substantial"]},
  {en:"nevertheless",vi:"tuy nhi\u00ean",opts:["nevertheless", "accumulate", "significance", "consequences"]},
  {en:"approximately",vi:"x\u1ea5p x\u1ec9",opts:["approximately", "controversy", "substantial", "infrastructure"]},
  {en:"consequences",vi:"h\u1eadu qu\u1ea3",opts:["consequences", "significance", "controversy", "substantial"]},
  {en:"contemporary",vi:"\u0111\u01b0\u01a1ng \u0111\u1ea1i",opts:["contemporary", "significance", "nevertheless", "consequences"]},
  {en:"comprehensive",vi:"to\u00e0n di\u1ec7n",opts:["comprehensive", "predominant", "unprecedented", "vulnerability"]},
  {en:"vulnerability",vi:"t\u00ednh d\u1ec5 b\u1ecb t\u1ed5n th\u01b0\u01a1ng",opts:["vulnerability", "nevertheless", "comprehensive", "accumulate"]},
  {en:"accumulate",vi:"t\u00edch l\u0169y",opts:["accumulate", "unprecedented", "contemporary", "predominant"]},
  {en:"substantial",vi:"\u0111\u00e1ng k\u1ec3",opts:["substantial", "phenomenon", "infrastructure", "significance"]},
  {en:"controversy",vi:"tranh c\u00e3i",opts:["controversy", "approximately", "vulnerability", "significance"]},
  {en:"predominant",vi:"chi\u1ebfm \u01b0u th\u1ebf",opts:["predominant", "vulnerability", "consequences", "significance"]},
  {en:"significance",vi:"\u00fd ngh\u0129a",opts:["significance", "approximately", "deteriorate", "vulnerability"]},
];

let accent='en-US', levelFilter='all';

// Merge extended data
SENTENCES.push(...SENTENCES_EX);
WORDS.push(...WORDS_EX);

function setAccent(a,btn){
  accent=a;
  btn.parentElement.querySelectorAll('.speed-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function setLevel(lv,btn){
  levelFilter=lv;
  btn.parentElement.querySelectorAll('.speed-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  current=0;correct=0;wrong=0;
  updateUI();
}

// Override getData to support level filter
const _origGetData = getData;
getData = function(){
  if(mode==='word') return WORDS;
  if(levelFilter==='all') return SENTENCES;
  return SENTENCES.filter(s => s.level === levelFilter || !s.level);
}

let mode='choose',speed=0.9,current=0,correct=0,wrong=0,answered=false;

function setMode(m,el){
  mode=m;current=0;correct=0;wrong=0;answered=false;
  document.querySelectorAll('.mode-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  updateUI();
}

function setSpeed(s){
  speed=s;
  document.getElementById('speedNormal').classList.toggle('active',s===0.9);
  document.getElementById('speedSlow').classList.toggle('active',s===0.6);
}

function getData(){return mode==='word'?WORDS:SENTENCES;}
function getTotal(){return getData().length;}

function playAudio(){
  speechSynthesis.cancel();
  const d=getData()[current];
  const u=new SpeechSynthesisUtterance(d.en);
  u.lang=accent;u.rate=speed;
  speechSynthesis.speak(u);
}

function updateUI(){
  const d=getData();const item=d[current];const total=d.length;
  document.getElementById('sCorrect').textContent=correct;
  document.getElementById('sWrong').textContent=wrong;
  document.getElementById('sCurrent').textContent=current+1;
  document.getElementById('sTotal').textContent=total;
  document.getElementById('progFill').style.width=((current/total)*100)+'%';
  document.getElementById('fbMsg').className='feedback-msg';
  answered=false;

  const area=document.getElementById('optionsArea');
  if(mode==='dictation'){
    area.innerHTML=`<input class="dict-input" id="dictInput" placeholder="Gõ lại câu bạn nghe..." onkeydown="if(event.key==='Enter')checkDictation()">
      <div style="margin-top:12px"><button class="opt-btn" style="max-width:200px;margin:0 auto" onclick="checkDictation()">• Kiểm tra</button></div>`;
  } else {
    const opts=item.opts.sort(()=>Math.random()-0.5);
    area.innerHTML='<div class="options">'+opts.map(o=>`<button class="opt-btn" onclick="checkAnswer(this,'${o.replace(/'/g,"\\'")}')">${o}</button>`).join('')+'</div>';
  }
}

function checkAnswer(btn,answer){
  if(answered)return;answered=true;
  const d=getData()[current];
  const correctAns=mode==='word'?d.en:d.vi;
  if(answer===correctAns){
    btn.classList.add('correct');correct++;
    showFB('• Đúng rồi!','rgba(107,203,119,0.1)','var(--green)');
  } else {
    btn.classList.add('wrong');wrong++;
    document.querySelectorAll('.opt-btn').forEach(b=>{if(b.textContent===correctAns)b.classList.add('correct');});
    showFB(`• Sai! Đáp án: "${correctAns}"`,'rgba(255,138,128,0.1)','var(--coral)');
  }
  setTimeout(()=>{if(current<getData().length-1){current++;updateUI();}else{showComplete();}},1500);
}

function checkDictation(){
  if(answered)return;answered=true;
  const input=document.getElementById('dictInput').value.trim().toLowerCase().replace(/[^a-z0-9\s]/g,'');
  const expected=getData()[current].en.toLowerCase().replace(/[^a-z0-9\s]/g,'');
  if(input===expected){correct++;showFB('• Tuyệt vời! Đúng hoàn toàn!','rgba(107,203,119,0.1)','var(--green)');}
  else{wrong++;showFB(`• Câu đúng: "${getData()[current].en}"`,'rgba(255,138,128,0.1)','var(--coral)');}
  setTimeout(()=>{if(current<getData().length-1){current++;updateUI();}else{showComplete();}},2000);
}

function showFB(msg,bg,color){
  const el=document.getElementById('fbMsg');
  el.innerHTML=msg;el.style.background=bg;el.style.color=color;
  el.className='feedback-msg show';
}

function showComplete(){
  const total=getData().length;const pct=Math.round((correct/total)*100);
  document.getElementById('optionsArea').innerHTML=`
    <div style="padding:20px;text-align:center">
      <div style="font-family:'Fraunces',serif;font-size:48px;color:var(--accent);margin-bottom:8px">${pct}%</div>
      <div style="font-size:14px;color:var(--text2);margin-bottom:16px">Đúng ${correct}/${total} câu</div>
      <button class="opt-btn" style="max-width:200px;margin:0 auto;background:var(--accent);color:#0b1a1e;font-weight:500" onclick="current=0;correct=0;wrong=0;updateUI()">• Làm lại</button>
    </div>`;
  document.getElementById('progFill').style.width='100%';
}

updateUI();

function toggleDrop(el){const d=el.closest('.nav-drop');const o=d.classList.contains('open');document.querySelectorAll('.nav-drop.open').forEach(x=>x.classList.remove('open'));if(!o)d.classList.add('open');}
document.addEventListener('click',e=>{if(!e.target.closest('.nav-drop'))document.querySelectorAll('.nav-drop.open').forEach(d=>d.classList.remove('open'));});
</script>

<script id="page-transition-js">
(function(){
  document.querySelector('.content')&&document.querySelector('.content').classList.add('page-enter');
  document.addEventListener('click',function(e){
    var a=e.target.closest('a[href]');
    if(!a)return;var h=a.getAttribute('href');
    if(!h||h.startsWith('#')||h.startsWith('http')||h.startsWith('javascript'))return;
    e.preventDefault();var c=document.querySelector('.content');
    if(c){c.classList.remove('page-enter');c.classList.add('page-exit');setTimeout(function(){window.location.href=h},200);}
    else{window.location.href=h;}
  });
})();
</script>
