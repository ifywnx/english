const TAGS=[...new Set(PV.map(function(p){return p.tag;}))];
let activeTag="all";
document.getElementById("tagBar").innerHTML='<button class="tag-btn active" onclick="setTag(\'all\',this)">Tất cả</button>'+TAGS.map(function(t){return '<button class="tag-btn" onclick="setTag(\''+t+'\',this)">'+t+' <span style="font-size:11px;color:var(--text3)">('+PV.filter(function(p){return p.tag===t;}).length+')</span></button>';}).join("");
function setTag(t,btn){activeTag=t;document.querySelectorAll(".tag-btn").forEach(function(b){b.classList.remove("active");});btn.classList.add("active");renderPV();}
function filterPV(){renderPV();}
function getFiltered(){var q=document.getElementById("searchBox").value.toLowerCase();return PV.filter(function(p){var mt=activeTag==="all"||p.tag===activeTag;var mq=!q||p.en.toLowerCase().includes(q)||p.vi.includes(q);return mt&&mq;});}
function renderPV(){
  var items=getFiltered();
  document.getElementById("countLabel").textContent=items.length+" phrasal verbs";
  document.getElementById("pvList").innerHTML=items.map(function(p){
    return '<div class="idiom-card"><div class="idiom-en">'+p.en+'</div><div class="idiom-vi" style="font-size:14px;color:var(--accent3);margin:2px 0">→ '+p.vi+'</div><div style="margin-top:8px;padding:10px 14px;background:var(--bg3);border-radius:8px;border-left:3px solid var(--accent2)"><div class="idiom-ex" style="font-size:13px;color:var(--text2)">"'+p.ex+'"</div></div><span style="display:inline-block;margin-top:8px;padding:2px 8px;border-radius:4px;font-size:11px;background:rgba(100,216,165,0.08);color:var(--accent)">'+p.tag+'</span></div>';
  }).join("");
}
var quizItems=[],quizIdx=0,quizScore=0,quizAnswered=false;
function startQuiz(){var pool=getFiltered();if(pool.length<4){alert("Cần ít nhất 4 PV!");return;}quizItems=pool.sort(function(){return Math.random()-0.5;}).slice(0,Math.min(10,pool.length));quizIdx=0;quizScore=0;document.getElementById("quizArea").style.display="block";document.getElementById("pvList").style.display="none";showQuizQ();}
function showQuizQ(){
  if(quizIdx>=quizItems.length){document.getElementById("quizArea").innerHTML='<div style="font-family:Fraunces,serif;font-size:48px;color:var(--accent)">'+Math.round(quizScore/quizItems.length*100)+'%</div><div style="color:var(--text2);font-size:14px;margin:8px 0 16px">Đúng '+quizScore+'/'+quizItems.length+'</div><button onclick="document.getElementById(\'quizArea\').style.display=\'none\';document.getElementById(\'pvList\').style.display=\'grid\'" style="padding:10px 24px;border-radius:8px;border:none;background:var(--accent);color:#0b1a1e;cursor:pointer;font-size:13px;font-weight:500;font-family:DM Sans,sans-serif">Đóng</button>';return;}
  var q=quizItems[quizIdx];var allVi=PV.map(function(p){return p.vi;}).filter(function(m){return m!==q.vi;}).sort(function(){return Math.random()-0.5;}).slice(0,3);allVi.push(q.vi);allVi.sort(function(){return Math.random()-0.5;});
  document.getElementById("qCur").textContent=quizIdx+1;document.getElementById("qTot").textContent=quizItems.length;document.getElementById("qPV").textContent=q.en;
  document.getElementById("qOpts").innerHTML=allVi.map(function(m){return '<button onclick="checkQuiz(this,this.dataset.a,this.dataset.c)" data-a="'+m.replace(/"/g,"&quot;")+'" data-c="'+q.vi.replace(/"/g,"&quot;")+'" style="padding:14px;border-radius:10px;border:0.5px solid var(--border);background:var(--card2);color:var(--text);cursor:pointer;font-size:14px;font-family:DM Sans,sans-serif;text-align:left">'+m+'</button>';}).join("");
  quizAnswered=false;
}
function checkQuiz(btn,ans,correct){if(quizAnswered)return;quizAnswered=true;if(ans===correct){btn.style.background="rgba(107,203,119,0.15)";btn.style.borderColor="var(--green)";btn.style.color="var(--green)";quizScore++;}else{btn.style.background="rgba(255,138,128,0.15)";btn.style.borderColor="var(--coral)";btn.style.color="var(--coral)";document.querySelectorAll("#qOpts button").forEach(function(b){if(b.dataset.a===correct){b.style.background="rgba(107,203,119,0.15)";b.style.borderColor="var(--green)";b.style.color="var(--green)";}});}setTimeout(function(){quizIdx++;showQuizQ();},1200);}
renderPV();
function toggleDrop(el){var d=el.closest(".nav-drop");var o=d.classList.contains("open");document.querySelectorAll(".nav-drop.open").forEach(function(x){x.classList.remove("open");});if(!o)d.classList.add("open");}
document.addEventListener("click",function(e){if(!e.target.closest(".nav-drop"))document.querySelectorAll(".nav-drop.open").forEach(function(d){d.classList.remove("open");});});
