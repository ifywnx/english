var curTopic='family';
function renderTabs(){
  var h='';TOPICS.forEach(function(t){h+='<button class="t-tab'+(t.id===curTopic?' active':'')+'" onclick="switchTopic(\''+t.id+'\',this)">'+t.icon+' '+t.name+'</button>';});
  document.getElementById('topicTabs').innerHTML=h;
}
function switchTopic(id,el){curTopic=id;document.querySelectorAll('.t-tab').forEach(function(b){b.classList.remove('active');});el.classList.add('active');renderWords();}
function renderWords(){
  var topic=TOPICS.find(function(t){return t.id===curTopic;});
  var h='<div class="word-grid">';
  topic.words.forEach(function(w){
    h+='<div class="w-card"><div><span class="w-en">'+w.en+'</span></div><div class="w-vi">'+w.vi+'</div><div class="w-ex">'+w.ex+'</div></div>';
  });
  h+='</div>';
  document.getElementById('wordContainer').innerHTML=h;
}
renderTabs();renderWords();
