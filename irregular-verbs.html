let activeGroup='all';
function setGroup(g,btn){activeGroup=g;document.querySelectorAll('.tag-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderVerbs();}
function filterVerbs(){renderVerbs();}
function renderVerbs(){
  var q=document.getElementById('searchBox').value.toLowerCase();
  var list=VERBS.filter(function(v){
    var mg=activeGroup==='all'||v.g===activeGroup;
    var mq=!q||v.v1.includes(q)||v.v2.includes(q)||v.v3.includes(q)||v.vi.includes(q);
    return mg&&mq;
  });
  document.getElementById('verbBody').innerHTML=list.map(function(v){
    return '<tr style="border-bottom:0.5px solid var(--border);transition:background .15s" onmouseover="this.style.background=\'rgba(100,216,165,0.04)\'" onmouseout="this.style.background=\'\'">'+
    '<td style="padding:10px 12px;font-weight:500;color:var(--accent)">'+v.v1+'</td>'+
    '<td style="padding:10px 12px;color:var(--accent2)">'+v.v2+'</td>'+
    '<td style="padding:10px 12px;color:var(--accent3)">'+v.v3+'</td>'+
    '<td style="padding:10px 12px;color:var(--text2);font-size:14px">'+v.vi+'</td>'+
    '<td style="padding:10px 6px"><span style="cursor:pointer;font-size:12px" onclick="speakTTS(this.dataset.t)" data-t="'+v.v1+', '+v.v2+', '+v.v3+'" title="Nghe phát âm"><i data-lucide="volume-2" style="width:14px;height:14px;display:inline-block;vertical-align:-2px;color:var(--text3)"></i></span></td></tr>';
  }).join('');
  if(typeof lucide!=='undefined')lucide.createIcons();
}
function speakTTS(t){speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(t);u.lang='en-US';u.rate=0.8;speechSynthesis.speak(u);}
var quizVerbs=[],quizIdx=0,quizScore=0,quizTotal=0;
function startQuiz(){quizVerbs=VERBS.slice().sort(function(){return Math.random()-0.5}).slice(0,10);quizIdx=0;quizScore=0;quizTotal=10;nextQuizQ();}
function nextQuizQ(){
  if(quizIdx>=quizTotal){document.getElementById('qWord').textContent=quizScore+'/'+quizTotal+' đúng!';document.getElementById('qPrompt').textContent='Bấm Bắt đầu Quiz để thử lại';document.getElementById('qInput').style.display='none';document.getElementById('qScore').textContent='';return;}
  var v=quizVerbs[quizIdx];var type=Math.random()>0.5?'v2':'v3';
  document.getElementById('qWord').textContent=v.v1;
  document.getElementById('qPrompt').textContent='Nhập dạng '+(type==='v2'?'V2 (Past Simple)':'V3 (Past Participle)');
  document.getElementById('qInput').style.display='block';document.getElementById('qInput').value='';document.getElementById('qInput').focus();
  document.getElementById('qInput').dataset.answer=v[type];document.getElementById('qInput').dataset.type=type;
  document.getElementById('qFeedback').textContent='';
  document.getElementById('qScore').textContent='Điểm: '+quizScore+'/'+quizTotal;
}
function checkQuizAnswer(){
  var inp=document.getElementById('qInput');var ans=inp.value.trim().toLowerCase();
  var correct=inp.dataset.answer.toLowerCase().split('/');
  if(correct.some(function(c){return c.trim()===ans;})){quizScore++;document.getElementById('qFeedback').innerHTML='<span style="color:var(--green)">Đúng!</span>';}
  else{document.getElementById('qFeedback').innerHTML='<span style="color:var(--coral)">Sai! Đáp án: <strong>'+inp.dataset.answer+'</strong></span>';}
  quizIdx++;setTimeout(nextQuizQ,1200);
}
renderVerbs();
