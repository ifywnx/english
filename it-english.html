var IT_INTERVIEW=[
{q:"Tell me about a challenging project you've worked on.",tip:"Mô tả dự án, vai trò, thử thách, cách giải quyết, kết quả. Dùng STAR method (Situation, Task, Action, Result)."},
{q:"How do you handle tight deadlines?",tip:"Chia nhỏ task, ưu tiên theo impact, communicate với team, không compromise quality."},
{q:"Explain the difference between SQL and NoSQL databases.",tip:"SQL: structured, relational, ACID. NoSQL: flexible schema, horizontal scaling, eventual consistency."},
{q:"What is your experience with version control?",tip:"Git workflow: branching (feature/develop/main), pull requests, code review, merge conflicts."},
{q:"How do you ensure code quality?",tip:"Code review, unit testing, linting, CI/CD, clean code principles, documentation."},
{q:"Describe your ideal development workflow.",tip:"Agile/Scrum, sprint planning, daily standup, PR review, automated testing, continuous deployment."},
{q:"How would you design a scalable system?",tip:"Load balancing, caching (Redis), database sharding, microservices, CDN, horizontal scaling, message queues."},
{q:"What is your experience with CI/CD?",tip:"Jenkins/GitHub Actions, automated testing, staging environments, blue-green deployment, rollback strategies."},
{q:"How do you handle technical debt?",tip:"Prioritize by impact, allocate sprint time for refactoring, document debt, balance new features vs cleanup."},
{q:"Describe a time you resolved a production incident.",tip:"Incident timeline, root cause analysis, immediate fix, post-mortem, preventive measures implemented."}
];

var IT_DIALOGS=[
{title:"Daily Standup Meeting",lines:[
{who:"Scrum Master",text:"Good morning, team. Let's keep it brief. What did you work on yesterday?"},
{who:"Dev A",text:"I finished the authentication module and pushed it to staging."},
{who:"Scrum Master",text:"Great. Any blockers?"},
{who:"Dev A",text:"Yes, I need the updated API docs from the backend team."},
{who:"Dev B",text:"I'll send those by noon. Yesterday I fixed the database migration issue."},
{who:"Scrum Master",text:"Perfect. What's the plan for today?"},
{who:"Dev B",text:"I'm starting on the payment integration. Should take about two days."},
{who:"Dev A",text:"I'll work on unit tests for the auth module once I get the API docs."},
{who:"Scrum Master",text:"Sounds good. Let's sync again tomorrow. Keep the Jira board updated."}
]},
{title:"Code Review Discussion",lines:[
{who:"Reviewer",text:"Hey, I left some comments on your pull request. Can we go through them?"},
{who:"Author",text:"Sure. What did you find?"},
{who:"Reviewer",text:"The error handling in the API controller — you're catching all exceptions with a generic handler."},
{who:"Author",text:"Good point. I'll add separate catch blocks for validation, auth, and server errors."},
{who:"Reviewer",text:"Also, this function is over 80 lines. Can we break it into smaller helpers?"},
{who:"Author",text:"Yeah, I'll split the data transformation into a separate utility."},
{who:"Reviewer",text:"One more thing — 'temp' and 'data2' aren't very descriptive variable names."},
{who:"Author",text:"Agreed. I'll rename them to 'transformedPayload' and 'validatedResponse'. Pushing updates this afternoon."}
]}
];

var IT_QUIZ=[
{q:"'Deploy' nghĩa là gì?",opts:["Xóa bỏ","Triển khai","Sao chép","Gỡ lỗi"],ans:1},
{q:"'API' viết tắt của gì?",opts:["Application Programming Interface","Advanced Program Installation","Automated Process Integration","Applied Protocol Interface"],ans:0},

{q:"'Vulnerability' nghĩa là gì?",opts:["Tính năng","Lỗ hổng bảo mật","Bản cập nhật","Cấu hình"],ans:1},
{q:"'DNS' nghĩa là gì?",opts:["Data Network System","Domain Name System","Digital Network Service","Direct Node Server"],ans:1},
{q:"'Product Owner' trong Scrum làm gì?",opts:["Viết code","Ưu tiên backlog","Test phần mềm","Quản lý server"],ans:1}
];

var curIT='dev';
function showITTab(t){curIT=t;document.querySelectorAll('.tc-tab').forEach(function(b){b.classList.remove('active');});document.getElementById('it-'+t).classList.add('active');renderIT();}

function renderIT(){
  var h='';
  var vocabTabs=['dev','devops','security','agile','cloud'];
  if(vocabTabs.indexOf(curIT)>-1){
    var data=IT_DATA[curIT];
    h=data.map(function(c){
      return '<div style="background:var(--card);border:0.5px solid var(--border);border-radius:14px;padding:20px;margin-bottom:14px">'+
        '<div style="font-size:18px;font-weight:600;color:var(--accent);margin-bottom:12px"><i data-lucide="code-2" style="width:16px;height:16px;display:inline-block;vertical-align:-2px;margin-right:6px"></i>'+c.cat+'</div>'+
        '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px">'+
          c.words.map(function(w){
            return '<div style="padding:10px 12px;background:rgba(100,216,165,0.03);border-radius:8px;border-left:3px solid var(--accent)">'+
              '<div style="display:flex;justify-content:space-between;align-items:center"><span style="font-weight:600;color:var(--text);font-family:monospace">'+w.en+'</span><span style="font-size:12px;color:var(--accent)">'+w.vi+'</span></div>'+
              '<div style="font-size:12px;color:var(--text3);margin-top:4px;font-style:italic">'+w.ex+'</div></div>';
          }).join('')+'</div></div>';
    }).join('');
  } else if(curIT==='interview'){
    h=IT_INTERVIEW.map(function(q,i){
      return '<div style="background:var(--card);border:0.5px solid var(--border);border-radius:14px;padding:20px;margin-bottom:12px">'+
        '<div style="font-size:15px;font-weight:600;color:var(--accent2);margin-bottom:8px"><i data-lucide="message-square" style="width:14px;height:14px;display:inline-block;vertical-align:-2px;margin-right:6px"></i>'+(i+1)+'. '+q.q+'</div>'+
        '<div style="font-size:13px;color:var(--text3);background:rgba(167,139,250,0.04);padding:10px 12px;border-radius:8px;border-left:3px solid var(--accent2);line-height:1.5"><i data-lucide="lightbulb" style="width:12px;height:12px;display:inline-block;vertical-align:-2px;margin-right:4px"></i>'+q.tip+'</div></div>';
    }).join('');
  } else if(curIT==='dialog'){
    h=IT_DIALOGS.map(function(d){
      return '<div style="background:var(--card);border:0.5px solid var(--border);border-radius:14px;padding:20px;margin-bottom:14px">'+
        '<div style="font-size:16px;font-weight:600;color:var(--accent3);margin-bottom:12px"><i data-lucide="message-circle" style="width:16px;height:16px;display:inline-block;vertical-align:-2px;margin-right:6px"></i>'+d.title+'</div>'+
        d.lines.map(function(l){
          var isLeft=l.who.indexOf('Master')>-1||l.who.indexOf('Reviewer')>-1;
          var bg=isLeft?'rgba(100,216,165,0.05)':'rgba(167,139,250,0.05)';
          var bc=isLeft?'var(--accent)':'var(--accent2)';
          return '<div style="padding:10px 14px;background:'+bg+';border-radius:10px;margin-bottom:6px;border-left:3px solid '+bc+'"><span style="font-size:12px;font-weight:600;color:'+bc+'">'+l.who+'</span><div style="font-size:14px;color:var(--text);margin-top:4px;line-height:1.5">'+l.text+'</div></div>';
        }).join('')+'</div>';
    }).join('');
  } else {
    h='<div style="background:var(--card);border:0.5px solid var(--border);border-radius:14px;padding:24px"><div style="font-size:16px;font-weight:600;color:var(--text);margin-bottom:16px"><i data-lucide="terminal" style="width:16px;height:16px;display:inline-block;vertical-align:-2px;margin-right:6px"></i>IT Quiz ('+IT_QUIZ.length+' câu)</div><div id="iqBox"><button onclick="startIQ()" style="padding:10px 20px;border-radius:10px;border:0.5px solid var(--border);background:rgba(100,216,165,0.1);color:var(--accent);cursor:pointer;font-size:14px;font-family:DM Sans,sans-serif">Bắt đầu</button></div></div>';
  }
  document.getElementById('itContent').innerHTML=h;
  if(typeof lucide!=="undefined")lucide.createIcons();
}

var iqI=0,iqOk=0;
function startIQ(){iqI=0;iqOk=0;nextIQ();}
function nextIQ(){
  if(iqI>=IT_QUIZ.length){var p=Math.round(iqOk/IT_QUIZ.length*100);document.getElementById('iqBox').innerHTML='<div style="font-size:28px;font-weight:600;color:var(--accent);margin:16px 0">'+iqOk+'/'+IT_QUIZ.length+' ('+p+'%)</div><button onclick="startIQ()" style="padding:10px 20px;border-radius:10px;border:0.5px solid var(--border);background:rgba(100,216,165,0.1);color:var(--accent);cursor:pointer;font-size:14px;font-family:DM Sans,sans-serif">Làm lại</button>';return;}
  var q=IT_QUIZ[iqI];
  document.getElementById('iqBox').innerHTML='<div style="font-size:13px;color:var(--text3);margin-bottom:8px">'+(iqI+1)+'/'+IT_QUIZ.length+'</div><div style="font-size:16px;color:var(--text);margin:12px 0;font-weight:500">'+q.q+'</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;max-width:500px;margin:0 auto">'+q.opts.map(function(o,i){return '<button onclick="chkIQ('+i+')" style="padding:10px;border-radius:8px;border:0.5px solid var(--border);background:var(--card2);color:var(--text);cursor:pointer;font-size:12px;font-family:DM Sans,sans-serif;text-align:left" id="iqo-'+i+'">'+o+'</button>';}).join('')+'</div><div id="iqFb" style="margin-top:8px;font-size:13px"></div>';
}
function chkIQ(i){
  var q=IT_QUIZ[iqI];
  document.querySelectorAll('#iqBox button').forEach(function(b){b.disabled=true;b.style.opacity='0.6';});
  document.getElementById('iqo-'+q.ans).style.background='rgba(107,203,119,0.15)';document.getElementById('iqo-'+q.ans).style.opacity='1';
  if(i===q.ans){iqOk++;document.getElementById('iqFb').innerHTML='<span style="color:var(--green)">Đúng!</span>';}
  else{document.getElementById('iqo-'+i).style.background='rgba(255,138,128,0.15)';document.getElementById('iqo-'+i).style.opacity='1';document.getElementById('iqFb').innerHTML='<span style="color:var(--coral)">Sai!</span>';}
  iqI++;setTimeout(nextIQ,1000);
}
renderIT();
</script>
